name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  # Needed so the "post failure as commit comment" step can write a
  # comment on the commit that just triggered the build. Lets us read
  # CI output without GitHub Actions log auth.
  pull-requests: write

jobs:
  test:
    name: PHP + Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ───── PHP ───────────────────────────────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          # 8.4 because composer.lock pins symfony 8.x which requires >=8.4.
          # Bump in lockstep if Laravel ever pulls in newer Symfony.
          php-version: '8.4'
          # gd is required by ImageCompressor (POD/triplicate compression);
          # intl + sqlite handle Carbon locale + the test DB respectively.
          extensions: gd, intl, sqlite, pdo_sqlite, mbstring, fileinfo, dom, xml
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install PHP deps
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Bootstrap env + key + DB
        run: |
          cp .env.example .env
          php artisan key:generate --ansi
          # Use an on-disk sqlite file so artisan migrate writes once and tests reuse it
          mkdir -p database
          touch database/database.sqlite
          php artisan migrate --force --no-interaction

      - name: Run tests
        id: tests
        run: |
          set -o pipefail
          php artisan test --without-tty --testdox 2>&1 | tee tests-output.txt

      - name: Write test output to job summary (publicly visible in Actions UI)
        if: always()
        run: |
          {
            echo "## Test output"
            echo ""
            echo '```'
            tail -c 60000 tests-output.txt 2>/dev/null || echo "(no output)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post test output as commit comment on failure
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## CI test output\n\n```\n';
            try { body += fs.readFileSync('tests-output.txt', 'utf8').slice(-8000); }
            catch (e) { body += '(no tests-output.txt)'; }
            body += '\n```';
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body,
            });

      - name: Pint (formatting check)
        run: ./vendor/bin/pint --test

      - name: Larastan (static analysis)
        run: ./vendor/bin/phpstan analyse --memory-limit=1G --no-progress

      # ───── Frontend ──────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install JS deps
        run: npm ci --legacy-peer-deps

      - name: ESLint (advisory — warnings allowed, errors fail)
        run: npm run lint -- --max-warnings=999

      - name: Build (tsc + vite)
        run: npm run build
