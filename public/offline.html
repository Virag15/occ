<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline — OCC</title>
    <style>
        :root { color-scheme: light dark; }
        body {
            margin: 0; min-height: 100vh; display: grid; place-items: center;
            font-family: Inter, system-ui, sans-serif; background: #f5f1e8; color: #1f1d1a;
            text-align: center; padding: 24px;
        }
        @media (prefers-color-scheme: dark) { body { background: #1a1916; color: #f5f1e8; } }
        .card { max-width: 380px; }
        h1 { font-size: 20px; margin: 16px 0 6px; }
        p { font-size: 14px; line-height: 1.55; opacity: 0.75; margin: 0 0 18px; }
        button {
            font: inherit; font-weight: 600; padding: 9px 18px; border-radius: 8px;
            border: 0; background: #1f1d1a; color: #f5f1e8; cursor: pointer;
        }
        @media (prefers-color-scheme: dark) { button { background: #f5f1e8; color: #1f1d1a; } }
        .logo { width: 56px; height: 56px; }
    </style>
</head>
<body>
    <div class="card">
        <img class="logo" src="/icon.svg" alt="OCC">
        <h1>You're offline</h1>
        <p>
            OCC can't reach the server right now. Anything you create while offline
            is saved on this device and will sync automatically once you're back online.
        </p>
        <button onclick="location.reload()">Try again</button>
    </div>
</body>
</html>
